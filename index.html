<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 학생 호출 현황</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        /* 새로 추가된 항목 반짝임 효과 */
        @keyframes highlight {
            0% { background-color: #E0F2FE; transform: scale(1.02); }
            100% { background-color: #ffffff; transform: scale(1); }
        }
        .new-item { animation: highlight 2s ease-out; }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 min-h-screen flex flex-col">

    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-lg p-6 flex justify-between items-end">
        <div>
            <h1 id="appTitle" class="text-4xl md:text-5xl font-black tracking-tight">학교 스마트 호출 현황판</h1>
            <p class="text-blue-200 mt-2 text-lg">자신의 이름이 보이면 즉시 해당 선생님께 이동하세요!</p>
        </div>
        <div class="text-right text-xs text-blue-200/60 hidden md:block">
            개발자: 가치있는 미래교육 연구소 대표 김병찬
        </div>
    </div>

    <div class="flex-grow p-6 md:p-10">
        <div id="recentCallsList" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
            <!-- 호출 카드 영역 -->
            <div class="col-span-full text-center text-gray-400 py-20 text-2xl font-bold animate-pulse">
                데이터를 불러오는 중입니다...
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 앱스 스크립트 배포 URL (정확한 URL 입력 필수)
        // ==========================================
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyqo0MToVmfvPkzyNgsRGG6nv4p4_IVmyD_4OzL_EPn-D8N7v0ZcbXxB_kYAFyH4SAN/exec"; 
        
        let previousCallsJson = "";

        async function fetchCallData() {
            if(WEB_APP_URL.includes("여기에")) {
                console.warn("웹앱 URL이 설정되지 않았습니다.");
                return;
            }

            try {
                const res = await fetch(`${WEB_APP_URL}?action=getData`);
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                const data = await res.json();
                
                document.getElementById('appTitle').innerText = `${data.schoolName} 학생 호출 현황판`;
                document.title = `${data.schoolName} 호출 현황`;

                const currentCallsJson = JSON.stringify(data.recentCalls);
                
                // 데이터 변경이 있을 때만 화면 갱신
                if (previousCallsJson !== currentCallsJson) {
                    renderCards(data.recentCalls, previousCallsJson !== "");
                    previousCallsJson = currentCallsJson;
                }
            } catch (error) {
                console.error("데이터 갱신 오류:", error);
                document.getElementById('recentCallsList').innerHTML = `<div class="col-span-full text-center text-red-500 py-20 text-2xl font-bold">통신 오류가 발생했습니다. URL 및 권한 설정을 확인해주세요.</div>`;
            }
        }

        function renderCards(calls, highlightTop) {
            const list = document.getElementById('recentCallsList');
            list.innerHTML = "";

            if(calls.length === 0) {
                list.innerHTML = `<div class="col-span-full text-center text-gray-400 py-20 text-3xl font-bold bg-white rounded-3xl border-dashed border-4 border-gray-200">현재 호출된 학생이 없습니다.</div>`;
                return;
            }

            calls.forEach((call, index) => {
                const isNew = highlightTop && index === 0;
                const card = document.createElement('div');
                card.className = `bg-white rounded-3xl shadow-xl shadow-blue-900/5 p-8 border-t-8 ${isNew ? 'border-red-500 new-item' : 'border-blue-400'} flex flex-col justify-between`;
                
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-6">
                            <span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-lg font-bold text-sm">
                                🕒 ${call.time}
                            </span>
                            <span class="bg-blue-100 text-blue-800 px-4 py-1 rounded-full font-black text-sm">
                                ${call.teacher} 선생님
                            </span>
                        </div>
                        <h2 class="text-4xl font-black text-gray-900 mb-2">${call.student.split(' ').pop()}</h2>
                        <h3 class="text-xl font-bold text-gray-500">${call.student.split(' ').slice(0, -1).join(' ')}</h3>
                    </div>
                    
                    <div class="mt-8 pt-6 border-t border-gray-100">
                        <p class="text-2xl font-bold text-blue-600">💬 "${call.reason}"</p>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // 초기 실행 및 3초마다 자동 새로고침 (빠른 동기화)
        if(!WEB_APP_URL.includes("여기에")) {
            fetchCallData();
            setInterval(fetchCallData, 3000); 
        } else {
            document.getElementById('recentCallsList').innerHTML = `<div class="col-span-full text-center text-red-500 py-20 text-2xl font-bold">⚠️ 소스코드에서 웹앱 URL을 먼저 입력해주세요!</div>`;
        }
    </script>
</body>
</html>
