<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 반 호출 현황판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        
        /* 강렬한 알림 애니메이션 */
        @keyframes emergencyBlink {
            0% { background-color: #ef4444; } /* bg-red-500 */
            50% { background-color: #dc2626; } /* bg-red-600 */
            100% { background-color: #ef4444; }
        }
        .alert-bg {
            animation: emergencyBlink 1.5s infinite;
        }

        /* 글자 튀어오르는 효과 */
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-text { animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="bg-slate-100 text-gray-800 min-h-screen flex flex-col overflow-hidden select-none">

    <div id="headerBar" class="bg-blue-800 text-white shadow-md p-4 flex justify-between items-center z-10 transition-all duration-500">
        <h1 id="appTitle" class="text-2xl md:text-3xl font-black tracking-tight">학교 스마트 호출 현황판</h1>
        <div class="text-right text-xs text-blue-200/60">
            개발자: 가치있는 미래교육 연구소 대표 김병찬
        </div>
    </div>

    <div id="setupView" class="flex-grow flex flex-col items-center justify-center p-6 z-10">
        <div class="bg-white rounded-3xl shadow-2xl p-10 max-w-md w-full text-center">
            <h2 class="text-3xl font-bold text-blue-900 mb-2">학급 설정</h2>
            <p class="text-gray-500 mb-8">이 화면에서 알림을 받을 우리 반을 선택하세요.</p>
            
            <div id="loadingSetup" class="text-blue-500 font-bold animate-pulse mb-4">
                데이터를 불러오는 중입니다...
            </div>

            <div id="setupForm" class="hidden space-y-6">
                <!-- 경고 메시지 출력 영역 -->
                <div id="warningArea"></div>

                <select id="classSelect" class="w-full p-4 rounded-2xl border-2 border-blue-100 bg-blue-50 focus:ring-4 focus:ring-blue-200 text-gray-800 font-bold text-xl text-center cursor-pointer appearance-none">
                    <option value="">우리 반 선택하기</option>
                </select>
                
                <button onclick="startMonitoring()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-300 transition-transform transform hover:-translate-y-1 text-2xl">
                    ✅ 알림 수신 시작
                </button>
                <p class="text-xs text-red-400 mt-2">※ 시작 버튼을 눌러야 음성 안내(TTS)가 활성화됩니다.</p>
            </div>
        </div>
    </div>

    <div id="standbyView" class="hidden flex-grow flex flex-col items-center justify-center p-6 z-10 relative">
        <div class="absolute inset-0 flex items-center justify-center opacity-5 pointer-events-none">
            <span class="text-[30rem]">🏫</span>
        </div>
        <div class="text-center z-10">
            <div id="standbyClass" class="text-blue-600 font-black text-4xl mb-6 bg-blue-100 inline-block px-6 py-2 rounded-full"></div>
            <h2 class="text-5xl md:text-7xl font-black text-gray-300 tracking-tighter">호출 대기 중</h2>
            <p class="text-xl md:text-2xl text-gray-400 mt-6 font-bold">자신의 이름이 울리면 즉시 이동하세요!</p>
        </div>
    </div>

    <div id="alertView" class="hidden fixed inset-0 z-50 alert-bg flex items-center justify-center p-4">
        <div class="bg-white/95 backdrop-blur-sm rounded-[3rem] shadow-2xl p-10 md:p-20 w-full max-w-6xl text-center border-8 border-white/50">
            <!-- 알림 헤더 -->
            <div class="flex justify-center items-center gap-4 mb-8 pop-text" style="animation-delay: 0.1s;">
                <span class="bg-red-100 text-red-600 px-6 py-2 rounded-full font-black text-2xl border-2 border-red-200 shadow-inner">
                    🚨 긴급 호출
                </span>
                <span id="alertTime" class="bg-gray-100 text-gray-600 px-6 py-2 rounded-full font-bold text-xl shadow-inner"></span>
            </div>
            
            <!-- 호출 학생 이름 (초대형) -->
            <h2 class="text-7xl md:text-[9rem] font-black text-gray-900 mb-6 leading-tight tracking-tighter pop-text" style="animation-delay: 0.3s;">
                <span id="alertStudentName" class="text-red-600 underline decoration-red-300 underline-offset-8">홍길동</span> 학생
            </h2>
            
            <!-- 호출 교사 -->
            <div class="text-3xl md:text-5xl font-bold text-gray-600 mb-10 pop-text" style="animation-delay: 0.5s;">
                [ <span id="alertTeacherName" class="text-blue-600 font-black">김교사</span> 선생님 ]
            </div>
            
            <!-- 호출 내용 -->
            <div class="bg-gray-50 border-t-8 border-b-8 border-gray-200 py-10 px-6 rounded-3xl pop-text" style="animation-delay: 0.7s;">
                <p id="alertReason" class="text-4xl md:text-6xl font-bold text-gray-800 break-keep leading-snug">
                    "교무실로 즉시 내려오세요."
                </p>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🚨 앱스 스크립트 '새 배포' 후 받은 URL로 다시 변경해 주세요!
        // ==========================================
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwg9dO9leTiqGZ2w53Xn9kvoRFPUb9zoXtcdr1vai92ekZ7nslb0fCh5kmYeUF7ZRTF/exec"; 

        let selectedClass = "";
        let isMonitoring = false;
        let lastCallSignature = ""; 
        let hideTimeout;
        let pollInterval;

        // 학년/반 텍스트 자동 변환 함수
        function formatClassName(name) {
            const str = String(name);
            const match = str.match(/^(\d+)[-\s](\d+)$/);
            if(match) return `${match[1]}학년 ${match[2]}반`;
            return str;
        }

        // 초기 설정 화면 데이터 로드
        async function initSetup() {
            if(WEB_APP_URL.includes("여기에")) {
                document.getElementById('loadingSetup').innerHTML = `<span class="text-red-500">코드에서 WEB_APP_URL을 설정해주세요.</span>`;
                return;
            }
            try {
                // 리다이렉트 옵션 추가 (구글 스크립트 통신 안정성 강화)
                const res = await fetch(`${WEB_APP_URL}?action=getData`, { redirect: 'follow' });
                if (!res.ok) throw new Error(`HTTP 상태 코드 에러: ${res.status}`);
                
                const data = await res.json();
                
                // 백엔드(앱스 스크립트)에서 자체 에러가 발생한 경우 처리
                if (data.error) {
                    throw new Error(`스프레드시트 에러: ${data.error}`);
                }
                
                document.getElementById('appTitle').innerText = `${data.schoolName} 현황판`;
                document.title = `${data.schoolName} 호출 현황`;

                const cSelect = document.getElementById('classSelect');

                // ⚠️ 데이터 검증 로직: 반 이름에 숫자가 아예 없다면(예: 김민준) 오류 감지 안내
                let isWrongData = data.classes && data.classes.length > 0 && !/\d/.test(data.classes[0]);
                if (isWrongData) {
                    document.getElementById('warningArea').innerHTML = `
                        <div class="bg-red-100 border-2 border-red-300 text-red-700 font-bold p-3 rounded-xl mb-4 text-sm">
                            ⚠️ 앱스 스크립트 버전 오류 감지!<br>반 이름 대신 학생 이름이 불려왔습니다.<br>구글 앱스 스크립트를 최신 코드로 <br>반드시 <b>'새 배포'</b> 해주세요.
                        </div>`;
                }

                data.classes.forEach(c => {
                    cSelect.add(new Option(formatClassName(c), c));
                });

                document.getElementById('loadingSetup').classList.add('hidden');
                document.getElementById('setupForm').classList.remove('hidden');

            } catch (error) {
                // 어떤 에러인지 화면에 아주 상세하게 출력해줍니다!
                const isSandbox = window.location.href.startsWith('blob:') || window.self !== window.top;
                let errorHtml = `<div class="text-red-600 font-bold mb-2 text-xl">데이터 로드 실패</div>
                                 <div class="text-sm text-red-500 mb-4 text-left bg-red-50 p-2 rounded">${error.message}</div>`;
                
                if (isSandbox) {
                    errorHtml += `<div class="bg-white p-4 rounded-lg border-2 border-red-300 text-sm text-gray-800 text-left shadow-md">
                        🚨 <b>통신 차단됨 (미리보기 환경)</b><br>
                        현재 보고 계신 우측 화면(미리보기 샌드박스)에서는 보안상 구글 서버와 통신할 수 없습니다.<br><br>
                        👉 <b>해결 방법:</b> 이 코드를 복사하여 바탕화면에 <b>student_app.html 파일로 저장</b>한 뒤, 크롬 등 인터넷 브라우저에서 직접 더블클릭하여 열어주세요.
                    </div>`;
                } else if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    errorHtml += `<div class="bg-white p-4 rounded-lg border-2 border-red-300 text-sm text-gray-800 text-left shadow-md">
                        🚨 <b>접근 권한 차단됨 (CORS 에러)</b><br>
                        구글 앱스 스크립트 배포 시 권한 설정이 잘못되었습니다.<br><br>
                        👉 <b>해결 방법:</b> 앱스 스크립트에서 <b>[새 배포]</b>를 다시 누르고, <b>'액세스 권한이 있는 사용자'</b>를 반드시 <b>'모든 사용자(Anyone)'</b>로 변경하여 다시 배포한 새 URL을 적용하세요.
                    </div>`;
                }
                
                document.getElementById('loadingSetup').innerHTML = errorHtml;
            }
        }

        function startMonitoring() {
            const classVal = document.getElementById('classSelect').value;
            if(!classVal) {
                // 경고창 대신 시각적 피드백
                const selectBtn = document.getElementById('classSelect');
                selectBtn.classList.add('border-red-500', 'animate-pulse');
                setTimeout(() => selectBtn.classList.remove('border-red-500', 'animate-pulse'), 2000);
                return;
            }

            selectedClass = classVal;
            isMonitoring = true;

            // 브라우저 오디오 권한 획득 (빈 음성 재생)
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(utterance);
            }

            // 화면 전환
            document.getElementById('headerBar').classList.add('hidden'); // 헤더 숨김
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('standbyView').classList.remove('hidden');
            document.getElementById('standbyClass').innerText = `✅ ${formatClassName(selectedClass)} 수신 중`;

            // 모니터링 폴링 시작 (3초 주기)
            pollData();
            pollInterval = setInterval(pollData, 3000);
        }

        async function pollData() {
            if (!isMonitoring) return;

            try {
                const res = await fetch(`${WEB_APP_URL}?action=getData`, { redirect: 'follow' });
                const data = await res.json();
                
                if (data.error) return; // 백엔드 에러 시 무시하고 다음 주기에 재시도
                
                // 해당 반의 호출인지 검사
                // call.student 형태가 "1-1 홍길동" 형태이므로 selectedClass("1-1")로 시작하는지 확인
                const recentCalls = data.recentCalls;
                
                // 최신 호출부터 역순으로 우리 반 데이터 찾기
                for(let i = 0; i < recentCalls.length; i++) {
                    const call = recentCalls[i];
                    if(call.student.startsWith(selectedClass + " ")) {
                        const callSignature = `${call.time}_${call.student}_${call.reason}`;
                        
                        // 새로운 호출인 경우!
                        if (lastCallSignature !== callSignature) {
                            lastCallSignature = callSignature;
                            triggerAlert(call);
                        }
                        break; // 가장 최신 데이터 하나만 확인하면 됨
                    }
                }
            } catch (e) {
                console.warn("통신 지연 중...");
            }
        }

        function triggerAlert(call) {
            // 학생 이름만 추출 ("1-1 홍길동" -> "홍길동")
            const studentName = call.student.split(' ').pop();
            const reason = call.reason;
            const teacher = call.teacher;

            // 화면 데이터 업데이트
            document.getElementById('alertTime').innerText = call.time;
            document.getElementById('alertStudentName').innerText = studentName;
            document.getElementById('alertTeacherName').innerText = teacher;
            document.getElementById('alertReason').innerText = `"${reason}"`;

            // 화면 전환
            document.getElementById('standbyView').classList.add('hidden');
            
            // 애니메이션 재시작을 위해 요소 복제 트릭 사용 (리플로우 방지)
            const alertView = document.getElementById('alertView');
            alertView.classList.remove('hidden');

            // 음성 안내 (TTS)
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // 이전 음성 취소
                
                // 텍스트 생성: "홍길동 학생, 교무실로 내려오세요. 다시 한번 알립니다. 홍길동 학생, 교무실로 내려오세요."
                const speechText = `${studentName} 학생, ${reason}. 다시 한번 알립니다. ${studentName} 학생, ${reason}.`;
                
                const utterance = new SpeechSynthesisUtterance(speechText);
                utterance.lang = 'ko-KR';
                utterance.rate = 0.9; // 살짝 천천히 또렷하게
                utterance.pitch = 1.0;
                
                window.speechSynthesis.speak(utterance);
            }

            // 기존 타이머 취소하고 새로 10초 설정
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                hideAlert();
            }, 10000); // 10초
        }

        // 알림 숨기고 대기화면으로 복귀
        function hideAlert() {
            document.getElementById('alertView').classList.add('hidden');
            document.getElementById('standbyView').classList.remove('hidden');
        }

        // 시작
        window.onload = initSetup;

    </script>
</body>
</html>
